<mat-toolbar class="navbar">
  <div class="navbar-container">
    <!-- Mobile Menu Button -->
    <button mat-icon-button class="menu-button" (click)="onMenuToggle()" aria-label="Toggle navigation menu">
      <mat-icon>menu</mat-icon>
    </button>

    <!-- Logo and Title -->
    <div class="navbar-brand" routerLink="/dashboard">
      <mat-icon class="brand-icon">receipt_long</mat-icon>
      <span class="brand-title">SplitIt</span>
    </div>

    <!-- Spacer -->
    <span class="spacer"></span>

    <!-- Offline Indicator -->
    <div *ngIf="!offlineSync.isOnline()" class="offline-badge" matTooltip="You are offline. Changes will sync later.">
      <mat-icon>cloud_off</mat-icon>
      <span class="hidden-xs">Offline</span>
    </div>

    <!-- Sync Indicator -->
    <div *ngIf="offlineSync.pendingCount() > 0" class="sync-badge" [class.syncing]="offlineSync.isSyncing()"
      matTooltip="{{ offlineSync.pendingCount() }} changes waiting to sync">
      <mat-icon [class.spin]="offlineSync.isSyncing()">sync</mat-icon>
      <span class="sync-count">{{ offlineSync.pendingCount() }}</span>
    </div>

    <!-- Search Button -->
    <button mat-icon-button class="search-button" (click)="openSearch()" matTooltip="Search (Ctrl+K)"
      *ngIf="authStore.user()" aria-label="Search expenses and groups">
      <mat-icon>search</mat-icon>
    </button>

    <!-- Language Switcher -->
    <button mat-icon-button [matMenuTriggerFor]="langMenu" aria-label="Switch language" matTooltip="Language / Idioma">
      <mat-icon>language</mat-icon>
    </button>
    <mat-menu #langMenu="matMenu">
      <button mat-menu-item (click)="switchLanguage('en-US')">
        <span>English</span>
      </button>
      <button mat-menu-item (click)="switchLanguage('es')">
        <span>Español</span>
      </button>
    </mat-menu>

    <!-- User Profile Menu -->
    <div class="navbar-actions" *ngIf="authStore.user()">
      <!-- Notifications (Future feature) -->
      <!-- <button mat-icon-button>
        <mat-icon [matBadge]="3" matBadgeColor="warn">notifications</mat-icon>
      </button> -->

      <!-- User Menu -->
      <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-button" aria-label="User profile and settings">
        <div class="user-avatar">{{ getInitials(authStore.user()?.name || '') }}</div>
        <span class="user-name">{{ authStore.user()?.name }}</span>
        <mat-icon>arrow_drop_down</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu">
        <div class="user-menu-header">
          <div class="user-menu-avatar">{{ getInitials(authStore.user()?.name || '') }}</div>
          <div class="user-menu-info">
            <div class="user-menu-name">{{ authStore.user()?.name }}</div>
            <div class="user-menu-email">{{ authStore.user()?.email }}</div>
          </div>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="navigateToProfile()">
          <mat-icon>person</mat-icon>
          <span>My Profile</span>
        </button>
        <button mat-menu-item (click)="onLogout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </div>
  </div>
</mat-toolbar>
