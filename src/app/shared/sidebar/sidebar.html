<aside class="sidebar" [class.open]="isOpen">
  <nav class="sidebar-nav" aria-label="Main Navigation">

    <!-- Main section -->
    <div class="nav-section">
      <span class="nav-section-label">Main</span>
      <mat-nav-list>
        <a mat-list-item *ngFor="let item of mainNavItems" [routerLink]="item.route" routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }" class="nav-item" (click)="onNavItemClick()"
          [attr.aria-label]="item.label">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      </mat-nav-list>
    </div>

    <!-- Account section -->
    <div class="nav-section">
      <span class="nav-section-label">Account</span>
      <mat-nav-list>
        <a mat-list-item *ngFor="let item of accountNavItems" [routerLink]="item.route" routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false }" class="nav-item" (click)="onNavItemClick()"
          [attr.aria-label]="item.label">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      </mat-nav-list>
    </div>

  </nav>

  <div class="sidebar-footer">
    <span class="footer-logo-text">SplitIt</span>
    <span class="footer-version">v1.0</span>
  </div>
</aside>
