<div
  class="avatar"
  [class]="'avatar-' + size"
  [matTooltip]="showTooltip ? name : ''"
  [ngStyle]="{ 'background-color': !imageUrl ? getBackgroundColor() : 'transparent' }"
>
  <img *ngIf="imageUrl" [src]="imageUrl" [alt]="name" class="avatar-image" />
  <span *ngIf="!imageUrl" class="avatar-initials">{{ getInitials() }}</span>
</div>
