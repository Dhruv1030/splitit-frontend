<div class="error-container">
  <div class="error-content">
    <!-- Animated 404 Icon -->
    <div class="error-icon-wrapper">
      <div class="error-icon">
        <mat-icon>search_off</mat-icon>
      </div>
      <div class="error-code">404</div>
    </div>

    <!-- Error Message -->
    <div class="error-message">
      <h1>Page Not Found</h1>
      <p class="error-description">
        Oops! The page you're looking for doesn't exist or has been moved.
      </p>
    </div>

    <!-- Action Buttons -->
    <div class="error-actions">
      <button mat-raised-button color="primary" (click)="goHome()" class="primary-action">
        <mat-icon>home</mat-icon>
        Go to Dashboard
      </button>
      <button mat-stroked-button (click)="goBack()" class="secondary-action">
        <mat-icon>arrow_back</mat-icon>
        Go Back
      </button>
    </div>

    <!-- Helpful Links -->
    <div class="helpful-links">
      <p>You might want to try:</p>
      <div class="link-buttons">
        <a mat-button routerLink="/groups">
          <mat-icon>group</mat-icon>
          Groups
        </a>
        <a mat-button routerLink="/expenses">
          <mat-icon>receipt</mat-icon>
          Expenses
        </a>
        <a mat-button routerLink="/settlements">
          <mat-icon>payments</mat-icon>
          Settlements
        </a>
        <a mat-button routerLink="/profile">
          <mat-icon>person</mat-icon>
          Profile
        </a>
      </div>
    </div>
  </div>

  <!-- Decorative Background -->
  <div class="background-decoration">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>
</div>
